<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASA SHOP | Premium Game Top-up</title>
    <link rel="icon" type="image/png" href="https://github.com/kohtethtetnaywin015-stack/casagameshop-app/blob/main/photo_2026-05-04_16-54-06.jpg?raw=true">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --accent: #3b82f6; --dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; padding-bottom: 120px; }
        .premium-header { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); clip-path: ellipse(150% 100% at 50% 0%); }
        .nav-pill { white-space: nowrap; padding: 10px 20px; border-radius: 14px; font-size: 13px; font-weight: 700; border: 1.5px solid #e2e8f0; background: white; color: #64748b; transition: 0.3s; }
        .nav-pill.active { background: var(--dark); color: white; border-color: var(--dark); transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .item-card { background: white; border: 1.5px solid #f1f5f9; border-radius: 18px; transition: 0.2s; cursor: pointer; position: relative; height: 85px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .item-card.selected { border-color: var(--accent); background: #eff6ff; }
        .item-card.selected::after { content: '✓'; position: absolute; top: 5px; right: 8px; color: var(--accent); font-weight: 900; font-size: 12px; }
        .input-box { background: white; border: 1.5px solid #e2e8f0; border-radius: 14px; width: 100%; padding: 14px; font-size: 14px; transition: 0.3s; }
        .input-box:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 15px 20px 30px; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .order-btn { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; width: 100%; height: 52px; border-radius: 14px; font-weight: 800; font-size: 15px; letter-spacing: 0.5px; box-shadow: 0 8px 20px rgba(15,23,42,0.2); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="premium-header pt-12 pb-16 px-6 text-center">
        <img src="https://github.com/kohtethtetnaywin015-stack/casagameshop-app/blob/main/photo_2026-05-04_16-54-06.jpg?raw=true" class="w-20 h-20 rounded-3xl border-4 border-white/20 shadow-2xl mx-auto mb-4">
        <h1 class="text-white text-2xl font-extrabold tracking-tight">CASA SHOP</h1>
        <p class="text-blue-100 text-[10px] font-bold uppercase tracking-[0.2em] opacity-80">Full Service Game Center</p>
    </div>

    <div class="px-5 -mt-8 max-w-lg mx-auto">
        <nav class="flex gap-3 overflow-x-auto py-4 scrollbar-hide">
            <button onclick="switchCategory('mlbb_std')" id="tab-mlbb_std" class="nav-pill active">MLBB</button>
            <button onclick="switchCategory('mlbb_ban')" id="tab-mlbb_ban" class="nav-pill">Ban Server</button>
            <button onclick="switchCategory('mlbb_indo')" id="tab-mlbb_indo" class="nav-pill">Indo</button>
            <button onclick="switchCategory('mlbb_rus')" id="tab-mlbb_rus" class="nav-pill">Russia</button>
            <button onclick="switchCategory('mcgg')" id="tab-mcgg" class="nav-pill">MCGG</button>
            <button onclick="switchCategory('hok')" id="tab-hok" class="nav-pill">HOK</button>
            <button onclick="switchCategory('ff')" id="tab-ff" class="nav-pill">Free Fire</button>
            <button onclick="switchCategory('pubg')" id="tab-pubg" class="nav-pill">PUBG</button>
            <button onclick="switchCategory('roblox')" id="tab-roblox" class="nav-pill">Roblox</button>
            <button onclick="switchCategory('coc')" id="tab-coc" class="nav-pill">COC</button>
            <button onclick="switchCategory('heartopia')" id="tab-heartopia" class="nav-pill">Heartopia</button>
            <button onclick="switchCategory('arena')" id="tab-arena" class="nav-pill">Arena</button>
            <button onclick="switchCategory('blood')" id="tab-blood" class="nav-pill">Blood Strike</button>
            <button onclick="switchCategory('once')" id="tab-once" class="nav-pill">Once Human</button>
            <button onclick="switchCategory('sky')" id="tab-sky" class="nav-pill">Sky</button>
            <button onclick="switchCategory('digital')" id="tab-digital" class="nav-pill">Digital</button>
        </nav>

        <div class="bg-white rounded-[24px] p-6 shadow-sm border border-slate-100 mb-6">
            <div class="space-y-4">
                <input type="text" id="userId" placeholder="Enter Player ID / Account" class="input-box">
                <input type="text" id="zoneId" placeholder="Server / Zone / Region" class="input-box">
            </div>
        </div>

        <div id="package-list" class="grid grid-cols-2 gap-4 mb-6"></div>

        <div class="bg-white rounded-[24px] p-6 shadow-sm border border-slate-100 mb-10">
            <div class="flex items-center justify-between bg-slate-50 p-4 rounded-xl mb-4">
                <div>
                    <p class="text-[10px] font-bold text-slate-400">KPAY (Ko Htet)</p>
                    <p class="font-bold text-slate-700">09943106995</p>
                </div>
                <button onclick="copyNum('09943106995')" class="bg-white px-3 py-1.5 rounded-lg text-blue-600 text-[10px] font-bold shadow-sm">COPY</button>
            </div>
            <div class="relative w-full h-40 border-2 border-dashed border-slate-200 rounded-[20px] flex flex-col items-center justify-center">
                <input type="file" id="slip" class="absolute inset-0 opacity-0 z-20" onchange="preview(event)" accept="image/*">
                <div id="upload-hint" class="text-center">
                    <i class="fas fa-camera text-slate-300 text-xl mb-2"></i>
                    <p class="text-[11px] font-bold text-slate-400">UPLOAD SLIP</p>
                </div>
                <img id="previewImg" class="hidden absolute inset-0 rounded-[18px] w-full h-full object-contain bg-white">
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button id="confirmBtn" onclick="send()" class="order-btn">CONFIRM ORDER</button>
    </div>

    <script>
        const BOT_TOKEN = '8499424443:AAFfOS1Dtj-O5WUW3weoWYmHGXxUqYWpcCY'; 
        const CHAT_ID = '5024679577';

        let currentCat = 'mlbb_std';
        let selectedItem = null;

        const allData = {
            mlbb_std: [{d: "Limited Time Pack", p: 1200}, {d: "Weekly Elite", p: 3600}, {d: "Weekly Pass", p: 6800}, {d: "11 💎", p: 900}, {d: "56 💎", p: 4200}, {d: "86 💎", p: 5700}, {d: "172 💎", p: 11000}, {d: "257 💎", p: 16100}, {d: "706 💎", p: 42500}, {d: "1049 💎", p: 63300}, {d: "2195 💎", p: 126500}, {d: "5532 💎", p: 319800}, {d: "9288 💎", p: 529800}, {d: "50+50 💎", p: 3900}, {d: "250+250 💎", p: 17200}],
            mlbb_ban: [{d: "Weekly Pass (Ban)", p: 9500}, {d: "70 💎", p: 5700}, {d: "140 💎", p: 11400}, {d: "284 💎", p: 22500}, {d: "716 💎", p: 55000}, {d: "1145 💎", p: 87800}, {d: "2976 💎", p: 271400}, {d: "5567 💎", p: 459200}, {d: "9377 💎", p: 748400}],
            mlbb_indo: [{d: "Weekly Pass (Indo)", p: 9000}, {d: "85 💎", p: 7500}, {d: "170 💎", p: 13700}, {d: "296 💎", p: 22600}, {d: "875 💎", p: 68000}, {d: "4830 💎", p: 368000}],
            mlbb_rus: [{d: "Weekly Pass (Rus)", p: 10050}, {d: "165 💎", p: 16000}, {d: "565 💎", p: 46700}, {d: "1155 💎", p: 89500}, {d: "2975 💎", p: 220000}, {d: "6000 💎", p: 440000}],
            mcgg: [{d: "MCGG WP", p: 7800}, {d: "86 💎", p: 7700}, {d: "172 💎", p: 12500}, {d: "516 💎", p: 35000}, {d: "2195 💎", p: 139000}, {d: "9288 💎", p: 559000}],
            hok: [{d: "Weekly Card", p: 5300}, {d: "Weekly Plus", p: 14200}, {d: "80 Tokens", p: 5000}, {d: "240 Tokens", p: 12500}, {d: "8000 Tokens", p: 429000}, {d: "Premium Rebate", p: 6800}],
            ff: [{d: "Weekly Pass", p: 9800}, {d: "Monthly Pass", p: 48000}, {d: "172 💎", p: 8100}, {d: "517 💎", p: 27500}, {d: "1052 💎", p: 54000}, {d: "3698 💎", p: 163000}],
            pubg: [{d: "60 UC", p: 4000}, {d: "325 UC", p: 22500}, {d: "660 UC", p: 40000}, {d: "1320 UC", p: 84000}, {d: "Prime Plus", p: 40000}],
            roblox: [{d: "80 Robux", p: 6200}, {d: "400 Robux", p: 23000}, {d: "1000 Robux", p: 47000}, {d: "Premium 1m", p: 48000}],
            coc: [{d: "80 Gems", p: 2500}, {d: "Gold Pass", p: 22500}, {d: "1200 Gems", p: 23200}, {d: "2500 Gems", p: 46000}],
            heartopia: [{d: "Junior Member", p: 3000}, {d: "Formal Member", p: 15500}, {d: "320 Heart", p: 24900}, {d: "3000 Heart", p: 215000}],
            arena: [{d: "66 Bonds", p: 4000}, {d: "335 Bonds", p: 18000}, {d: "1690 Bonds", p: 87000}, {d: "3400 Bonds", p: 177000}],
            blood: [{d: "105 Gold", p: 3600}, {d: "1100 Gold", p: 33500}, {d: "Strike Pass Elite", p: 20000}],
            once: [{d: "62 Crystgin", p: 4500}, {d: "1120 Crystgin", p: 63500}, {d: "Battle Pass", p: 43200}],
            sky: [{d: "Season Pass", p: 32000}, {d: "72 Candles", p: 66000}],
            digital: [{d: "Telegram Prem 3m", p: 45000}, {d: "iTunes 5$", p: 22750}, {d: "Netflix 4K", p: 15000}, {d: "Capcut Prem", p: 8000}, {d: "Canva Lifetime", p: 3500}]
        };

        function switchCategory(cat) {
            currentCat = cat; selectedItem = null;
            document.querySelectorAll('.nav-pill').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${cat}`).classList.add('active');
            render();
        }

        function render() {
            const list = document.getElementById('package-list');
            list.innerHTML = '';
            (allData[currentCat] || []).forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-card p-4 text-center';
                div.onclick = () => {
                    selectedItem = item;
                    document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
                    div.classList.add('selected');
                };
                div.innerHTML = `<div class="text-slate-500 font-bold text-[10px] mb-1">${item.d}</div>
                                 <div class="text-slate-800 font-extrabold text-[13px]">${item.p.toLocaleString()} Ks</div>`;
                list.appendChild(div);
            });
        }

        function copyNum(num) { navigator.clipboard.writeText(num); alert("Copied!"); }
        function preview(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = () => {
                    const img = document.getElementById('previewImg');
                    img.src = reader.result;
                    img.classList.remove('hidden');
                    document.getElementById('upload-hint').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        async function send() {
            const id = document.getElementById('userId').value;
            const zone = document.getElementById('zoneId').value;
            const slip = document.getElementById('slip').files[0];
            const btn = document.getElementById('confirmBtn');

            if(!id || !selectedItem || !slip) return alert("Fill all info and upload slip!");

            btn.innerText = "SENDING..."; btn.disabled = true;

            const msg = `💎 NEW ORDER - CASA SHOP\n━━━━━━━━━━━━━━━\nGame: ${currentCat.toUpperCase()}\nItem: ${selectedItem.d}\nPrice: ${selectedItem.p.toLocaleString()} Ks\n\nID: ${id}\nZone/Server: ${zone}\n━━━━━━━━━━━━━━━`;

            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', slip);
            fd.append('caption', msg);

            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                if(res.ok) { alert("Order Sent!"); location.reload(); }
                else { alert("Error!"); }
            } catch { alert("Network Error!"); }
            finally { btn.innerText = "CONFIRM ORDER"; btn.disabled = false; }
        }
        window.onload = () => switchCategory('mlbb_std');
    </script>
</body>
</html>
