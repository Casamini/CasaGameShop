        let activeCat = 'mlbb_std';
        let activeItem = null;

        function init() {
            const nav = document.getElementById('nav-bar');
            Object.keys(DB).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `nav-pill ${key === activeCat ? 'active' : ''}`;
                btn.id = `tab-${key}`;
                btn.innerText = DB[key].name || DB[key].n;
                btn.onclick = () => switchCat(key);
                nav.appendChild(btn);
            });
            render();
        }

        function switchCat(key) {
            activeCat = key; activeItem = null;
            document.querySelectorAll('.nav-pill').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${key}`).classList.add('active');
            render();
        }

        function render() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            DB[activeCat].i.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-card text-center';
                div.onclick = () => {
                    activeItem = item;
                    document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
                    div.classList.add('selected');
                };
                div.innerHTML = `<div class="text-[10px] font-bold text-slate-400 mb-1 leading-tight uppercase">${item.d}</div>
                                 <div class="text-slate-800 font-extrabold text-[15px]">${item.p.toLocaleString()} Ks</div>`;
                grid.appendChild(div);
            });
        }

        function copyNum(n) { navigator.clipboard.writeText(n); alert("KPay Number Copied!"); }

        function preview(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = () => {
                    const img = document.getElementById('previewImg');
                    img.src = reader.result; img.classList.remove('hidden');
                    document.getElementById('upload-hint').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        async function sendOrder() {
            const id = document.getElementById('userId').value;
            const zone = document.getElementById('zoneId').value;
            const slip = document.getElementById('slip').files[0];
            const btn = document.getElementById('confirmBtn');

            if(!id || !activeItem || !slip) return alert("Please provide ID, Package, and Receipt Slip!");

            btn.innerText = "PROCESSING..."; btn.disabled = true;

            const caption = `💎 CASA SHOP ORDER\n━━━━━━━━━━━━━━━\nGame: ${DB[activeCat].n}\nPackage: ${activeItem.d}\nPrice: ${activeItem.p.toLocaleString()} Ks\n━━━━━━━━━━━━━━━\nID: ${id}\nZone/Server: ${zone}`;

            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', slip);
            fd.append('caption', caption);

            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                if(res.ok) { alert("Order Sent Successfully!"); location.reload(); }
                else { alert("Error sending order. Check credentials."); }
            } catch { alert("Network Connection Error."); }
            finally { btn.innerText = "CONFIRM ORDER"; btn.disabled = false; }
        }
